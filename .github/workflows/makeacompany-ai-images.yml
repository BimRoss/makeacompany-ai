name: Build makeacompany-ai images

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: geeemoney/makeacompany-ai-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=build,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          target: production
          build-args: |
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: geeemoney/makeacompany-ai-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache-dependency-path: backend/go.sum

      - name: Go test
        run: cd backend && go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=build,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gitops-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    env:
      RANCHER_ADMIN_REPO: bimross/rancher-admin
    steps:
      - name: Compute release version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout rancher-admin
        uses: actions/checkout@v6
        with:
          repository: ${{ env.RANCHER_ADMIN_REPO }}
          ref: master
          token: ${{ secrets.RANCHER_ADMIN_REPO_TOKEN }}
          path: rancher-admin

      - name: Update makeacompany-ai image tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"]
          paths = [
              Path("rancher-admin/admin/apps/makeacompany-ai/frontend.yaml"),
              Path("rancher-admin/admin/apps/makeacompany-ai/backend.yaml"),
          ]
          for path in paths:
              content = path.read_text()
              pattern = r"(geeemoney/makeacompany-ai-(?:frontend|backend):)[^\s\"']+"
              updated = re.sub(pattern, lambda m: f"{m.group(1)}{version}", content)
              path.write_text(updated)
          PY

      - name: Commit and push manifest updates
        working-directory: rancher-admin
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git config user.name "makeacompany-ai-ci"
          git config user.email "makeacompany-ai-ci@users.noreply.github.com"
          git add admin/apps/makeacompany-ai/frontend.yaml admin/apps/makeacompany-ai/backend.yaml
          git commit -m "release(makeacompany-ai): bump images to ${VERSION}"
          git push origin master
