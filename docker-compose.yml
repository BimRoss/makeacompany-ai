# Local full stack: docker compose --profile local up --build
#
# Prereq: cp .env.example .env.dev && fill secrets. Local profile services load
#   ${MAKEACOMPANY_AI_ENV_FILE:-.env.dev}; frontend-prod loads ${MAKEACOMPANY_AI_ENV_FILE:-.env.prod}.
# Optional: MAKEACOMPANY_AI_ENV_FILE=.env.prod for prod-like compose. Host Next/go that only read ./.env:
#   ./scripts/use-env.sh dev|prod → symlink .env → .env.dev|.env.prod
#
# Compose interpolates the whole file before profiles apply. KUBECONFIG_HOST_PATH defaults to
# ${HOME}/.kube/config/admin.yaml (BimRoss layout) so `docker compose --profile prod` works without a root
# .env; override with KUBECONFIG_HOST_PATH=/dev/null if you must parse prod services on a machine with no
# kube fragment. For prod Next env + Stripe keys together, prefer `npm run docker:prod` / --env-file .env.prod.
# frontend-prod defaults env_file to .env.prod when MAKEACOMPANY_AI_ENV_FILE is unset (local → .env.dev).
#
# Default host ports avoid clashing with sibling stacks run in other terminals:
# - This stack: Redis → host ${REDIS_PORT:-6380}, API → ${BACKEND_PORT:-8090}
# - employee-factory (separate compose) defaults workers to redis://host.docker.internal:${REDIS_PORT:-6380}/0
#   so one Redis holds makeacompany:admin:*, waitlist hashes, and employee-factory:* (omit COMPANY_CHANNELS_REDIS_URL on the backend).
# - slack-orchestrator publishes HTTP on 8080 by default. Orchestrator debug uses host.docker.internal + SLACK_ORCHESTRATOR_PORT.
# Profile prod: Grafana forward publishes host ${PROD_GRAFANA_HOST_PORT:-13000} → svc/makeacompany-ai-grafana:3000 (see k8s-grafana-forward).
#
services:
  redis:
    profiles: ["local"]
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data

  backend:
    profiles: ["local"]
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      - ${MAKEACOMPANY_AI_ENV_FILE:-.env.dev}
    environment:
      PORT: "8080"
      # Matches one-shot jobs below; override via shell or project `.env` for compose interpolation (`${…}` does not read env_file).
      BACKEND_INTERNAL_SERVICE_TOKEN: ${BACKEND_INTERNAL_SERVICE_TOKEN:-mac-local-dev-internal-service-token}
      # Use COMPOSE_REDIS_URL so a host-only REDIS_URL in .env.dev (e.g. for go run) does not break the container.
      # Example shared DB: COMPOSE_REDIS_URL=redis://host.docker.internal:6379/1
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379/0}
      # employee-factory:* keys (registry, channel-knowledge digest for /admin Transcript) — set in env file; see .env.example
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # When set, GET /v1/runtime/capability-catalog proxies slack-orchestrator (live Skills on /admin), no auth.
      # Default matches ORCHESTRATOR_DEBUG: orchestrator on host SLACK_ORCHESTRATOR_PORT (8080). Override with '' to disable.
      SLACK_ORCHESTRATOR_CAPABILITY_CATALOG_URL: ${SLACK_ORCHESTRATOR_CAPABILITY_CATALOG_URL:-http://host.docker.internal:${SLACK_ORCHESTRATOR_PORT:-8080}/debug/capability-catalog}
      # Same host as Next ORCHESTRATOR_DEBUG_* — backend hourly/startup snapshot for /admin Companies strip.
      ORCHESTRATOR_DEBUG_BASE_URL: ${ORCHESTRATOR_DEBUG_BASE_URL:-http://host.docker.internal:${SLACK_ORCHESTRATOR_PORT:-8080}}
      ORCHESTRATOR_DEBUG_TOKEN: ${ORCHESTRATOR_DEBUG_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    ports:
      - "${BACKEND_PORT:-8090}:8080"

  # One-shot: snapshot + company registry from slack-orchestrator (same as /admin Companies discover). Requires orchestrator on host SLACK_ORCHESTRATOR_PORT. Override MEMBER_CHANNELS_SNAPSHOT_REFRESH_URL for snapshot-only POST.
  slack-member-channels-snapshot-refresh:
    profiles: ["local"]
    image: alpine:3.20
    entrypoint: ["/bin/sh", "/snapshot-refresh.sh"]
    volumes:
      - ./scripts/snapshot-refresh.sh:/snapshot-refresh.sh:ro
    env_file:
      - ${MAKEACOMPANY_AI_ENV_FILE:-.env.dev}
    depends_on:
      - backend
    environment:
      POST_URL: ${MEMBER_CHANNELS_SNAPSHOT_REFRESH_URL:-http://backend:8080/v1/internal/bootstrap-company-channels-from-orchestrator}
      BACKEND_INTERNAL_SERVICE_TOKEN: ${BACKEND_INTERNAL_SERVICE_TOKEN:-mac-local-dev-internal-service-token}
      SNAPSHOT_LABEL: slack-member-channels-snapshot-refresh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  frontend-local:
    profiles: ["local"]
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      target: development
    env_file:
      - ${MAKEACOMPANY_AI_ENV_FILE:-.env.dev}
    depends_on:
      - backend
    environment:
      # Browser → published API port on host (COMPOSE_PUBLIC_API_URL avoids .env.dev still saying :8080)
      NEXT_PUBLIC_BACKEND_API_BASE_URL: ${COMPOSE_PUBLIC_API_URL:-http://localhost:8090}
      # Server-side API routes → backend service on the compose network (not localhost)
      BACKEND_INTERNAL_API_BASE_URL: http://backend:8080
      # slack-orchestrator in another terminal: published on host as SLACK_ORCHESTRATOR_PORT (default 8080)
      ORCHESTRATOR_DEBUG_BASE_URL: ${ORCHESTRATOR_DEBUG_BASE_URL:-http://host.docker.internal:${SLACK_ORCHESTRATOR_PORT:-8080}}
      ORCHESTRATOR_DEBUG_TOKEN: ${ORCHESTRATOR_DEBUG_TOKEN:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_LINKEDIN_PARTNER_ID: ${NEXT_PUBLIC_LINKEDIN_PARTNER_ID:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-${STRIPE_PUBLISHABLE_KEY:-}}
      NEXT_TELEMETRY_DISABLED: "1"
      # /admin: after Slack workspace users include this email, auto POST Joanne #humans welcome once per tab
      NEXT_PUBLIC_COMPOSE_PROFILE_LOCAL: "1"
      NEXT_PUBLIC_LOCAL_DOCKER_AUTO_HUMANS_WELCOME_EMAIL: "grantdfoster@gmail.com"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs

  # Frontend dev server + prod backend via in-compose kubectl forward.
  frontend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      target: development
    env_file:
      - ${MAKEACOMPANY_AI_ENV_FILE:-.env.prod}
    depends_on:
      k8s-backend-forward:
        condition: service_healthy
      k8s-orchestrator-forward:
        condition: service_healthy
      k8s-grafana-forward:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_BACKEND_API_BASE_URL: http://localhost:${PROD_BACKEND_PORT:-18080}
      BACKEND_INTERNAL_API_BASE_URL: http://k8s-backend-forward:8080
      # Prod cluster slack-orchestrator (same pattern as k8s-backend-forward); override in env file if needed.
      ORCHESTRATOR_DEBUG_BASE_URL: ${ORCHESTRATOR_DEBUG_BASE_URL:-http://k8s-orchestrator-forward:8080}
      ORCHESTRATOR_DEBUG_TOKEN: ${ORCHESTRATOR_DEBUG_TOKEN:-}
      # Browser loads iframes from host; must match published PROD_GRAFANA_HOST_PORT (see k8s-grafana-forward).
      HEALTH_GRAFANA_LOCAL_BASE_URL: ${HEALTH_GRAFANA_LOCAL_BASE_URL:-http://127.0.0.1:${PROD_GRAFANA_HOST_PORT:-13000}}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_LINKEDIN_PARTNER_ID: ${NEXT_PUBLIC_LINKEDIN_PARTNER_ID:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-${STRIPE_PUBLISHABLE_KEY:-}}
      NEXT_TELEMETRY_DISABLED: "1"
      # Same `next dev` image as local; /admin tables read Redis on load — use Refresh for live Stripe/Slack pulls.
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs

  k8s-backend-forward:
    profiles: ["prod"]
    image: registry.k8s.io/kubectl:v1.32.2
    command:
      - --kubeconfig=/kube/config
      - --context
      - ${KUBECONFIG_CONTEXT:-admin}
      - -n
      - makeacompany-ai
      - port-forward
      - svc/makeacompany-ai-backend
      - 8080:8080
      - --address
      - 0.0.0.0
    volumes:
      - ${KUBECONFIG_HOST_PATH:-${HOME}/.kube/config/admin.yaml}:/kube/config:ro
    ports:
      - "${PROD_BACKEND_PORT:-18080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "kubectl",
          "--kubeconfig=/kube/config",
          "--context",
          "${KUBECONFIG_CONTEXT:-admin}",
          "-n",
          "makeacompany-ai",
          "get",
          "svc",
          "makeacompany-ai-backend",
          "-o",
          "name",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # kubectl port-forward to prod slack-orchestrator (admin / orchestrator log table).
  k8s-orchestrator-forward:
    profiles: ["prod"]
    image: registry.k8s.io/kubectl:v1.32.2
    command:
      - --kubeconfig=/kube/config
      - --context
      - ${KUBECONFIG_CONTEXT:-admin}
      - -n
      - slack-orchestrator
      - port-forward
      - svc/slack-orchestrator
      - 8080:8080
      - --address
      - 0.0.0.0
    volumes:
      - ${KUBECONFIG_HOST_PATH:-${HOME}/.kube/config/admin.yaml}:/kube/config:ro
    healthcheck:
      test:
        [
          "CMD",
          "kubectl",
          "--kubeconfig=/kube/config",
          "--context",
          "${KUBECONFIG_CONTEXT:-admin}",
          "-n",
          "slack-orchestrator",
          "get",
          "svc",
          "slack-orchestrator",
          "-o",
          "name",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # kubectl port-forward to prod makeacompany-ai Grafana (same stack as ingress /grafana).
  k8s-grafana-forward:
    profiles: ["prod"]
    image: registry.k8s.io/kubectl:v1.32.2
    command:
      - --kubeconfig=/kube/config
      - --context
      - ${KUBECONFIG_CONTEXT:-admin}
      - -n
      - makeacompany-ai
      - port-forward
      - svc/makeacompany-ai-grafana
      - 3000:3000
      - --address
      - 0.0.0.0
    volumes:
      - ${KUBECONFIG_HOST_PATH:-${HOME}/.kube/config/admin.yaml}:/kube/config:ro
    ports:
      - "${PROD_GRAFANA_HOST_PORT:-13000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "kubectl",
          "--kubeconfig=/kube/config",
          "--context",
          "${KUBECONFIG_CONTEXT:-admin}",
          "-n",
          "makeacompany-ai",
          "get",
          "svc",
          "makeacompany-ai-grafana",
          "-o",
          "name",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

volumes:
  redis_data:
