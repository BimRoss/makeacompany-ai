# Local full stack: docker compose --profile local up --build
#
# Default host ports avoid clashing with sibling stacks run in other terminals:
# - employee-factory publishes Redis on 6379 and workers on 18081–18085
# - slack-orchestrator (separate compose) publishes HTTP on 8080 by default
# So: makeacompany Redis → 6380, API → 8090. Orchestrator debug uses host.docker.internal + SLACK_ORCHESTRATOR_PORT.
#
services:
  redis:
    profiles: ["local"]
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data

  backend:
    profiles: ["local"]
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      - ./.env
    environment:
      PORT: "8080"
      # Use COMPOSE_REDIS_URL so a host-only REDIS_URL in .env (e.g. for go run) does not break the container.
      # Example shared DB: COMPOSE_REDIS_URL=redis://host.docker.internal:6379/1
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379/0}
      # employee-factory:* keys (registry, channel-knowledge digest for /admin Transcript) — set in .env; see .env.example
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # When set, GET /v1/runtime/capability-catalog proxies slack-orchestrator (live Skills on /admin), no auth.
      # Example with orchestrator on host:8080: http://host.docker.internal:8080/debug/capability-catalog
      SLACK_ORCHESTRATOR_CAPABILITY_CATALOG_URL: ${SLACK_ORCHESTRATOR_CAPABILITY_CATALOG_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    ports:
      - "${BACKEND_PORT:-8090}:8080"

  frontend-local:
    profiles: ["local"]
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      target: development
    env_file:
      - ./.env
    depends_on:
      - backend
    environment:
      # Browser → published API port on host (COMPOSE_PUBLIC_API_URL avoids .env still saying :8080)
      NEXT_PUBLIC_BACKEND_API_BASE_URL: ${COMPOSE_PUBLIC_API_URL:-http://localhost:8090}
      # Server-side API routes → backend service on the compose network (not localhost)
      BACKEND_INTERNAL_API_BASE_URL: http://backend:8080
      # slack-orchestrator in another terminal: published on host as SLACK_ORCHESTRATOR_PORT (default 8080)
      ORCHESTRATOR_DEBUG_BASE_URL: ${ORCHESTRATOR_DEBUG_BASE_URL:-http://host.docker.internal:${SLACK_ORCHESTRATOR_PORT:-8080}}
      ORCHESTRATOR_DEBUG_TOKEN: ${ORCHESTRATOR_DEBUG_TOKEN:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_LINKEDIN_PARTNER_ID: ${NEXT_PUBLIC_LINKEDIN_PARTNER_ID:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST:-${STRIPE_PUBLISHABLE_KEY_TEST:-}}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_LIVE: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_LIVE:-${STRIPE_PUBLISHABLE_KEY_LIVE:-}}
      NEXT_TELEMETRY_DISABLED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs

  # Frontend dev server + prod backend via in-compose kubectl forward.
  frontend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      target: development
    env_file:
      - ./.env
    depends_on:
      k8s-backend-forward:
        condition: service_healthy
      k8s-orchestrator-forward:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_BACKEND_API_BASE_URL: http://localhost:${PROD_BACKEND_PORT:-18080}
      BACKEND_INTERNAL_API_BASE_URL: http://k8s-backend-forward:8080
      # Prod cluster slack-orchestrator (same pattern as k8s-backend-forward); override in .env if needed.
      ORCHESTRATOR_DEBUG_BASE_URL: ${ORCHESTRATOR_DEBUG_BASE_URL:-http://k8s-orchestrator-forward:8080}
      ORCHESTRATOR_DEBUG_TOKEN: ${ORCHESTRATOR_DEBUG_TOKEN:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_LINKEDIN_PARTNER_ID: ${NEXT_PUBLIC_LINKEDIN_PARTNER_ID:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST:-${STRIPE_PUBLISHABLE_KEY_TEST:-}}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_LIVE: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_LIVE:-${STRIPE_PUBLISHABLE_KEY_LIVE:-}}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs

  k8s-backend-forward:
    profiles: ["prod"]
    image: registry.k8s.io/kubectl:v1.32.2
    command:
      - --kubeconfig=/kube/config
      - --context
      - ${KUBECONFIG_CONTEXT:-admin}
      - -n
      - makeacompany-ai
      - port-forward
      - svc/makeacompany-ai-backend
      - 8080:8080
      - --address
      - 0.0.0.0
    volumes:
      - ${KUBECONFIG_HOST_PATH:?Set KUBECONFIG_HOST_PATH to your local kubeconfig file}:/kube/config:ro
    ports:
      - "${PROD_BACKEND_PORT:-18080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "kubectl",
          "--kubeconfig=/kube/config",
          "--context",
          "${KUBECONFIG_CONTEXT:-admin}",
          "-n",
          "makeacompany-ai",
          "get",
          "svc",
          "makeacompany-ai-backend",
          "-o",
          "name",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # kubectl port-forward to prod slack-orchestrator (admin / orchestrator log table).
  k8s-orchestrator-forward:
    profiles: ["prod"]
    image: registry.k8s.io/kubectl:v1.32.2
    command:
      - --kubeconfig=/kube/config
      - --context
      - ${KUBECONFIG_CONTEXT:-admin}
      - -n
      - slack-orchestrator
      - port-forward
      - svc/slack-orchestrator
      - 8080:8080
      - --address
      - 0.0.0.0
    volumes:
      - ${KUBECONFIG_HOST_PATH:?Set KUBECONFIG_HOST_PATH to your local kubeconfig file}:/kube/config:ro
    healthcheck:
      test:
        [
          "CMD",
          "kubectl",
          "--kubeconfig=/kube/config",
          "--context",
          "${KUBECONFIG_CONTEXT:-admin}",
          "-n",
          "slack-orchestrator",
          "get",
          "svc",
          "slack-orchestrator",
          "-o",
          "name",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

volumes:
  redis_data:
